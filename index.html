<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر الشاهين | متجر إلكتروني سحابي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');

        :root {
            --bg: #090909;
            --bg-soft: #121212;
            --panel: rgba(20, 20, 20, 0.92);
            --panel-border: rgba(212, 175, 55, 0.22);
            --gold: #d4af37;
            --gold-soft: #f4d978;
            --text: #f8f5ec;
            --muted: #a5a095;
            --danger: #ff6b6b;
            --success: #2ecc71;
            --shadow: 0 18px 40px rgba(0, 0, 0, 0.38);
            --radius: 22px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Tajawal", sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background:
                radial-gradient(circle at top right, rgba(212, 175, 55, 0.12), transparent 28%),
                radial-gradient(circle at bottom left, rgba(255, 255, 255, 0.05), transparent 18%),
                linear-gradient(180deg, #050505, #101010 46%, #080808);
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        .page-shell {
            max-width: 1450px;
            margin: 0 auto;
            padding: 22px;
        }

        .hero {
            background:
                linear-gradient(135deg, rgba(212, 175, 55, 0.16), rgba(255, 255, 255, 0.04)),
                rgba(17, 17, 17, 0.86);
            border: 1px solid var(--panel-border);
            border-radius: 32px;
            padding: 34px;
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
        }

        .hero::before,
        .hero::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.24), transparent 70%);
            pointer-events: none;
        }

        .hero::before {
            width: 280px;
            height: 280px;
            top: -120px;
            left: -100px;
        }

        .hero::after {
            width: 220px;
            height: 220px;
            bottom: -120px;
            right: -60px;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1.35fr 0.9fr;
            gap: 26px;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .hero h1 {
            font-size: clamp(2rem, 5vw, 4rem);
            line-height: 1.15;
            margin-bottom: 14px;
        }

        .hero p {
            color: var(--muted);
            max-width: 720px;
            font-size: 1.05rem;
        }

        .hero-actions {
            margin-top: 24px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .btn,
        .btn-secondary,
        .btn-ghost {
            border: none;
            cursor: pointer;
            border-radius: 14px;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
        }

        .btn {
            background: linear-gradient(135deg, var(--gold), #f1d173);
            color: #161616;
            font-weight: 800;
            padding: 14px 22px;
            box-shadow: 0 16px 30px rgba(212, 175, 55, 0.22);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 14px 22px;
        }

        .btn-ghost {
            background: transparent;
            color: var(--muted);
            padding: 10px 14px;
        }

        .btn:hover,
        .btn-secondary:hover,
        .btn-ghost:hover,
        .product-card:hover,
        .icon-btn:hover {
            transform: translateY(-2px);
        }

        .hero-card {
            background: rgba(0, 0, 0, 0.24);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 22px;
            backdrop-filter: blur(10px);
        }

        .hero-mark {
            width: 108px;
            height: 108px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 26px;
            margin-bottom: 18px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.16), rgba(255, 255, 255, 0.04));
            border: 1px solid rgba(212, 175, 55, 0.18);
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.24);
            padding: 16px;
        }

        .hero-copy {
            max-width: 680px;
        }

        .hero-mark svg {
            width: 100%;
            height: 100%;
            display: block;
            fill: var(--gold-soft);
            filter: drop-shadow(0 10px 18px rgba(212, 175, 55, 0.16));
        }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .stat {
            padding: 18px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .stat strong {
            display: block;
            font-size: 1.8rem;
            color: var(--gold-soft);
            margin-bottom: 6px;
        }

        .section-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin: 28px 0 18px;
            flex-wrap: wrap;
        }

        .section-head h2 {
            font-size: 1.5rem;
        }

        .main-layout {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 380px;
            gap: 24px;
            align-items: start;
            margin-top: 28px;
        }

        .catalog {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .toolbar,
        .cart-panel,
        .info-strip {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .toolbar {
            padding: 18px;
        }

        .toolbar-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr auto;
            gap: 12px;
        }

        .field,
        .field textarea,
        .field input,
        .field select {
            width: 100%;
        }

        .field input,
        .field select,
        .field textarea {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 14px 15px;
            outline: none;
            transition: border-color 0.2s ease, background 0.2s ease;
        }

        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            border-color: rgba(212, 175, 55, 0.6);
            background: rgba(255, 255, 255, 0.06);
        }

        .field textarea {
            min-height: 96px;
            resize: vertical;
        }

        .info-strip {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
            padding: 14px;
        }

        .info-card {
            padding: 14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .info-card span {
            display: block;
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .info-card strong {
            font-size: 1.08rem;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
        }

        .product-card {
            background: linear-gradient(180deg, rgba(22, 22, 22, 0.96), rgba(11, 11, 11, 0.96));
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 0;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 18px 30px rgba(0, 0, 0, 0.24);
            display: flex;
            flex-direction: column;
            min-height: 100%;
            overflow: hidden;
            animation: cardReveal 0.55s ease both;
        }

        .product-media {
            position: relative;
            padding: 14px 14px 0;
        }

        .product-image {
            width: 100%;
            aspect-ratio: 16 / 11;
            object-fit: cover;
            display: block;
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background:
                radial-gradient(circle at top, rgba(212, 175, 55, 0.16), transparent 40%),
                linear-gradient(135deg, #1b1b1b, #101010);
            transition: transform 0.45s ease, filter 0.35s ease;
            cursor: zoom-in;
        }

        .product-media::after {
            content: "";
            position: absolute;
            inset: 14px 14px 0;
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.04), rgba(0, 0, 0, 0.44));
            pointer-events: none;
        }

        .product-badge-floating {
            position: absolute;
            top: 26px;
            right: 26px;
            z-index: 1;
            background: rgba(12, 12, 12, 0.72);
            color: var(--gold-soft);
            border: 1px solid rgba(212, 175, 55, 0.26);
            backdrop-filter: blur(8px);
            padding: 8px 12px;
            border-radius: 999px;
            font-size: 0.82rem;
        }

        .product-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }

        .product-body {
            padding: 16px 18px 18px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            flex: 1;
        }

        .product-card h3 {
            font-size: 1.28rem;
            margin-bottom: 6px;
        }

        .product-meta {
            color: var(--muted);
            font-size: 0.96rem;
            min-height: 58px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .gallery-dots {
            position: absolute;
            left: 28px;
            bottom: 14px;
            z-index: 1;
            display: flex;
            gap: 7px;
        }

        .gallery-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.25s ease, background 0.25s ease;
            cursor: pointer;
        }

        .gallery-dot.active {
            background: var(--gold-soft);
            transform: scale(1.25);
            border-color: rgba(212, 175, 55, 0.4);
        }

        .product-features {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .feature-chip {
            padding: 7px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            color: #dad5cc;
        }

        .price-row {
            margin-top: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .price-block strong {
            display: block;
            color: var(--gold-soft);
            font-size: 1.55rem;
        }

        .price-block span {
            color: var(--muted);
            font-size: 0.84rem;
        }

        .product-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 46px;
            min-width: 46px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            cursor: pointer;
            transition: transform 0.18s ease, border-color 0.18s ease;
        }

        .cart-panel {
            padding: 20px;
            position: sticky;
            top: 20px;
        }

        .cart-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
        }

        .cart-head h2 {
            font-size: 1.35rem;
        }

        .cart-count {
            background: rgba(212, 175, 55, 0.12);
            color: var(--gold-soft);
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 0.9rem;
        }

        .cart-items {
            display: flex;
            flex-direction
