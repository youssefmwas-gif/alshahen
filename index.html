<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d4af37">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>متجر الشاهين</title>
<meta name="description" content="متجر الشاهين – خدمات رقمية، اشتراكات، VPN، ذكاء اصطناعي">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d4af37">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b0b0b;
  color:#fff;
}
header{
  text-align:center;
  padding:20px;
}
h1{color:#d4af37}
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:1fr 340px;
  gap:20px;
}
.card{
  background:#141414;
  border-radius:15px;
  padding:15px;
}
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:15px;
}
.product{
  border:1px solid #222;
  border-radius:12px;
  padding:12px;
}
button{
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
.gold{background:#d4af37;color:#000;font-weight:bold}
.gray{background:#222;color:#fff}
.cart-item{
  border-bottom:1px solid #333;
  padding:8px 0;
}
.small{font-size:0.85rem;color:#aaa}
.lang-switch{
  position:fixed;
  top:10px;
  left:10px;
}
.toast{
  position:fixed;
  bottom:20px;
  left:20px;
  background:#111;
  padding:12px 16px;
  border-radius:10px;
  border:1px solid #333;
  opacity:0;
  transition:0.3s;
}
.toast.show{opacity:1}
</style>
</head>

<body>

<div class="lang-switch">
  <button onclick="setLang('ar')">AR</button>
  <button onclick="setLang('en')">EN</button>
</div>

<header>
  <h1 id="storeTitle">متجر الشاهين</h1>
  <p id="storeDesc">خدمات رقمية – اشتراكات – VPN</p>
</header>

<div class="container">
  <main>
    <div class="products" id="products"></div>
  </main>

  <aside class="card">
    <h2 id="cartTitle">السلة</h2>
    <div id="cartItems"></div>
    <p><strong id="totalLabel">الإجمالي:</strong> <span id="total">0$</span></p>
    <button class="gold" onclick="sendOrder()" id="checkoutBtn">إتمام الطلب</button>
    <button class="gray" onclick="copyCash()">نسخ رقم شام كاش</button>
    <p class="small">الدفع عبر شام كاش أو محفظة إلكترونية</p>
  </aside>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================= CONFIG ================= */
const CONFIG = {
  SHEET_URL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRY1w6nmp-7CxSzU-V9-rBi2AtOkkrpqYQGAWIyl-gLT1K_3Et2tsoNH3oxwgmHlBylDBjw_0lCczae/pub?output=csv",
  ADMIN_PASSWORD: "SHAHIN_ADMIN_123",
  WHATSAPP: "963934000097",
  SHAM_CASH: "123456789"
};

/* ================= LANG ================= */
const TEXT = {
  ar:{
    title:"متجر الشاهين",
    desc:"خدمات رقمية – اشتراكات – VPN",
    cart:"السلة",
    total:"الإجمالي:",
    add:"إضافة للسلة",
    priceHidden:"تواصل لمعرفة السعر",
    checkout:"إتمام الطلب"
  },
  en:{
    title:"Shahin Store",
    desc:"Digital Services – Subscriptions – VPN",
    cart:"Cart",
    total:"Total:",
    add:"Add to cart",
    priceHidden:"Contact for price",
    checkout:"Checkout"
  }
};
let lang = localStorage.getItem("lang") || "ar";

/* ================= STATE ================= */
let products = [];
let cart = [];
let isAdmin = localStorage.getItem("admin")==="1";
let lastOrder = 0;

/* ================= UI ================= */
function t(k){ return TEXT[lang][k]; }

function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;
  el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"),2500);
}

function setLang(l){
  localStorage.setItem("lang",l);
  location.reload();
}

/* ================= LOAD PRODUCTS ================= */
async function loadProducts(){
  const res = await fetch(CONFIG.SHEET_URL,{cache:"no-store"});
  const text = await res.text();
  const rows = text.split("\n").slice(1);

  products = rows.map((r,i)=>{
    const c = r.split(",");
    return {
      id:i+1,
      name:c[0],
      price:Number(c[1]),
      active:c[3]==="TRUE",
      adminOnly:c[4]==="TRUE"
    };
  }).filter(p=>p.active && (isAdmin || !p.adminOnly));

  renderProducts();
}

/* ================= RENDER ================= */
function renderProducts(){
  const wrap=document.getElementById("products");
  wrap.innerHTML="";
  products.forEach(p=>{
    const price = isAdmin ? `${p.price}$` : t("priceHidden");
    wrap.innerHTML+=`
      <div class="product">
        <h3>${p.name}</h3>
        <p>${price}</p>
        <button class="gray" onclick="addToCart(${p.id})">${t("add")}</button>
      </div>`;
  });
}

function renderCart(){
  const wrap=document.getElementById("cartItems");
  if(!cart.length){
    wrap.innerHTML="<p class='small'>فارغة</p>";
    return;
  }
  wrap.innerHTML="";
  cart.forEach(i=>{
    wrap.innerHTML+=`
      <div class="cart-item">
        ${i.name} × ${i.qty}
        <span style="float:left">${i.price*i.qty}$</span>
      </div>`;
  });
  document.getElementById("total").textContent=
    cart.reduce((s,i)=>s+i.price*i.qty,0)+"$";
}

/* ================= LOGIC ================= */
function addToCart(id){
  const p=products.find(x=>x.id===id);
  if(!p) return;
  const e=cart.find(x=>x.id===id);
  e?e.qty++:cart.push({id:p.id,name:p.name,price:p.price,qty:1});
  renderCart();
  toast("تمت الإضافة");
}

function sendOrder(){
  if(Date.now()-lastOrder<60000){toast("انتظر دقيقة");return;}
  if(!cart.length){toast("السلة فارغة");return;}
  lastOrder=Date.now();

  let text="طلب جديد:\n";
  cart.forEach((i,n)=>text+=`${n+1}) ${i.name} x${i.qty}\n`);
  text+="الإجمالي: "+cart.reduce((s,i)=>s+i.price*i.qty,0)+"$\n";
  window.open("https://wa.me/"+CONFIG.WHATSAPP+"?text="+encodeURIComponent(text));
}

function copyCash(){
  navigator.clipboard.writeText(CONFIG.SHAM_CASH);
  toast("تم نسخ رقم شام كاش");
}

/* ================= ADMIN ================= */
let clicks=0;
document.querySelector("h1").onclick=()=>{
  clicks++;
  if(clicks===5){
    const p=prompt("كلمة مرور الأدمن:");
    if(p===CONFIG.ADMIN_PASSWORD){
      localStorage.setItem("admin","1");
      location.reload();
    }
  }
};

/* ================= INIT ================= */
document.getElementById("storeTitle").textContent=t("title");
document.getElementById("storeDesc").textContent=t("desc");
document.getElementById("cartTitle").textContent=t("cart");
document.getElementById("totalLabel").textContent=t("total");
document.getElementById("checkoutBtn").textContent=t("checkout");

loadProducts();

/* ================= PWA ================= */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js");
}
</script>

  navigator.serviceWorker.register("sw.js");
}
``

</body>
</html>
